name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing tag to build and publish'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test
        run: go test ./...

      - name: Cross-compile
        run: make cross-build

      - name: Build container image
        run: make container-image

      - name: Build QPKG
        run: make container-qbuild

      - name: Sign QPKG (if token available)
        env:
          QNAP_CODESIGNING_TOKEN: ${{ secrets.QNAP_CODESIGNING_TOKEN }}
        run: |
          if [ -n "$QNAP_CODESIGNING_TOKEN" ]; then
            make container-sign
          else
            echo "QNAP_CODESIGNING_TOKEN secret not set — publishing unsigned QPKG."
          fi

      - name: Create release asset
        run: |
          cd build
          cp qnap-docker-mdns_*.qpkg qnap-docker-mdns.qpkg

      - name: Checksums
        run: |
          cd build
          sha256sum qnap-docker-mdns.qpkg > checksums.txt
          cat checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            build/qnap-docker-mdns.qpkg
            build/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
